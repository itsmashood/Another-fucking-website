<!-- MUSIC PLAYER -->

<audio id="bg-music"></audio>

<script>

const music = document.getElementById("bg-music");

const playlist = [

"music1.mp3",
"music2.mp3",
"music3.mp3",
"music4.mp3",
"music5.mp3"

];

let currentSong = 0;


/* Load first song */

music.src = playlist[currentSong];


/* Browser requires click before audio */

window.addEventListener("click",()=>{

music.play();

},{once:true});


/* Switch songs automatically */

music.addEventListener("ended",()=>{

currentSong++;


/* Restart playlist after last song */

if(currentSong >= playlist.length){

currentSong = 0;

}

music.src = playlist[currentSong];

music.play();

});

</script>
